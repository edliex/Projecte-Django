name: Generar Documentació Pydoc

on:
  push:
    branches: [ main ] 

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codi
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instal·lar dependències
        run: |
          python -m pip install --upgrade pip
          pip install django Pillow

      - name: Generar HTML amb Pydoc
        run: |
          mkdir -p docs
          cd LinaresEdgarApp
          export DJANGO_SETTINGS_MODULE=LinaresEdgarApp.settings
          export PYTHONPATH=$PWD
          python -c "import django; django.setup(); import pydoc; pydoc.writedoc('blog.models'); pydoc.writedoc('blog.views')"
          mv *.html ../docs/
          
      - name: Deploy a GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
