{% extends 'base.html' %}

{% block page_title %}
    Llista d'Autors
{% endblock %}

{% block content %}
<div class="table-section">
    <h1 class="table-title">Llista d'Autors</h1>
    <table class="autors-table">
        <thead>
            <tr>
                <th>Nom</th>
                <th>Cognom</th>
                <th></th> </tr>
        </thead>
        <tbody>
            {% for autor in autors %}
                <tr>
                    <td>{{ autor.nom }}</td>
                    <td>{{ autor.cognom }}</td>
                    <td class="action-cell">
                        <a href="{% url 'author-detail' autor.id %}" class="btn-saberne">
                            saber-ne +
                        </a>
                    </td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="3" class="empty-row">Encara no hi ha autors registrats.</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
